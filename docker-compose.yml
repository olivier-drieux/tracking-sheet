services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracking-sheet
    restart: unless-stopped
    ports:
      - '3333:3333'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: info
      APP_URL: http://localhost:3333
      APP_KEY: change-me-in-production
      SESSION_DRIVER: cookie
    volumes:
      - tracking-sheet-tmp:/app/tmp
    command: sh -c "node ace migration:run --force && node bin/server.js"

volumes:
  tracking-sheet-tmp:
